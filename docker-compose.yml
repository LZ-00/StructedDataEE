services:
  backend:
    image: sdweb/backend:latest
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        PRELOAD_EMBEDDING: "true"
    container_name: sdweb-backend
    environment:
      SECRET_KEY: ${SECRET_KEY:-sdweb-dev-secret-change-in-production}
      DEFAULT_USERNAME: ${DEFAULT_USERNAME:-root}
      DEFAULT_PASSWORD: ${DEFAULT_PASSWORD:-123456}
      EMBEDDING_CACHE_DIR: /data/lz/modelscope/embedding
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - backend_data:/app/backend/app/data
      - backend_runtime:/data/lz
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    image: sdweb/frontend:latest
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: sdweb-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  backend_data:
  backend_runtime:
